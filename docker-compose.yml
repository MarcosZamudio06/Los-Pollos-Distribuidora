services:
  postgres:
    image: postgis/postgis:16-3.5-alpine
    platform: ${MAP_DOCKER_PLATFORM:-linux/amd64}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pollo_distribucion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      API_PREFIX: ${API_PREFIX:-api}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-10}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-pollo_distribucion}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      MAP_DATA_VERSION: ${MAP_DATA_VERSION:-mexico-latest}
      MAP_DATA_PREPARED_AT: ${MAP_DATA_PREPARED_AT:-}
      NODE_ENV: production
      OSRM_PROFILE: ${OSRM_PROFILE:-driving}
      OSRM_URL: ${OSRM_URL:-http://osrm:5000}
      PHOTON_URL: ${PHOTON_URL:-http://photon:2322}
      PORT: ${PORT:-4000}
      SWAGGER_PATH: ${SWAGGER_PATH:-docs}
      VROOM_URL: ${VROOM_URL:-http://vroom:3000}
    command: npm run start:docker
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          const net = require('node:net');
          const socket = net.createConnection({ host: '127.0.0.1', port: Number(process.env.PORT || 4000) });
          socket.setTimeout(2000);
          socket.once('connect', () => { socket.end(); process.exit(0); });
          socket.once('timeout', () => { socket.destroy(); process.exit(1); });
          socket.once('error', () => process.exit(1));
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    ports:
      - "${BACKEND_PORT:-4000}:${PORT:-4000}"
    networks:
      - app_network

  photon:
    profiles: ["maps"]
    build:
      context: .
      dockerfile: docker/maps/photon/Dockerfile
      args:
        PHOTON_VERSION: ${PHOTON_VERSION:-1.2.1}
    image: pollos-distribuidor/photon:${PHOTON_VERSION:-1.2.1}
    platform: ${MAP_DOCKER_PLATFORM:-linux/amd64}
    restart: unless-stopped
    volumes:
      - ${MAP_DATA_DIR:-./.map-data}/photon:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:2322/status"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - app_network

  osrm:
    profiles: ["maps"]
    build:
      context: .
      dockerfile: docker/maps/osrm/Dockerfile
      args:
        OSRM_VERSION: ${OSRM_VERSION:-v5.27.1}
    image: pollos-distribuidor/osrm:${OSRM_VERSION:-v5.27.1}
    platform: ${MAP_DOCKER_PLATFORM:-linux/amd64}
    command: ["osrm-routed", "--algorithm", "mld", "/data/mexico-latest.osrm"]
    restart: unless-stopped
    volumes:
      - ${MAP_DATA_DIR:-./.map-data}/osrm:/data:ro
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - --silent
        - http://127.0.0.1:5000/nearest/v1/driving/-96.1342,19.1738?number=1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - app_network

  vroom:
    profiles: ["maps"]
    image: ghcr.io/vroom-project/vroom-docker:${VROOM_VERSION:-v1.15.0}
    platform: ${MAP_DOCKER_PLATFORM:-linux/amd64}
    environment:
      VROOM_ROUTER: osrm
    restart: unless-stopped
    volumes:
      - ./docker/maps/vroom/config.yml:/conf/config.yml:ro
    depends_on:
      osrm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - app_network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    environment:
      VITE_DEV_API_PROXY_TARGET: http://backend:4000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
